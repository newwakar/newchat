<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="chat-container">
        <div id="chat-window"></div>
        <div id="input-area">
            <input type="text" id="username" placeholder="Name">
            <input type="text" id="message" placeholder="Message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflamhkpiiserkouoddn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jeIYowehIo1v1TwDmOcmnA__scjV28B';
       // Change 'const supabase' to 'const supabaseClient'
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Now, update your functions to use 'supabaseClient' instead of 'supabase'
async function fetchMessages() {
    const { data, error } = await supabaseClient
        .from('messages')
        .select('*')
        .order('created_at', { ascending: true });
    
    if (data) {
        chatWindow.innerHTML = '';
        data.forEach(msg => appendMessage(msg));
    }
}

document.getElementById('send-btn').onclick = async () => {
    const username = document.getElementById('username').value || 'Anonymous';
    const content = document.getElementById('message').value;
    if (!content) return;

    const { error } = await supabaseClient
        .from('messages')
        .insert([{ username, content }]);

    if (!error) document.getElementById('message').value = '';
};

// Update the real-time subscription too
supabaseClient
    .channel('public:messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        appendMessage(payload.new);
    })
    .subscribe();    </script> 
</body>
</html>
