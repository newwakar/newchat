<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>#open-chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --bg2:       #161b22;
      --bg3:       #21262d;
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.15);
      --accent:    #1d9e75;
      --accent2:   #0f6e56;
      --accent3:   #9fe1cb;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
      --radius:    14px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.6; }

    /* ── JOIN SCREEN ── */
    #join-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 24px;
    }
    .join-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 40px;
      max-width: 400px; width: 100%;
      display: flex; flex-direction: column; gap: 20px;
    }
    .join-card h2 { font-family: var(--font-mono); font-size: 22px; font-weight: 700; color: var(--text); }
    .join-card h2 span { color: var(--accent3); }
    .join-card p { font-size: 14px; color: var(--muted); margin-top: -10px; }

    .join-field { display: flex; flex-direction: column; gap: 6px; }
    .join-field label { font-size: 12px; color: var(--muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.5px; }
    .join-field input {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px;
      font-size: 15px; font-family: var(--font-body);
      color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .join-field input:focus { border-color: var(--accent); }

    .color-row { display: flex; gap: 10px; align-items: center; }
    .color-row input[type=text] { flex: 1; }
    #join-color-preview {
      width: 44px; height: 44px; border-radius: 10px;
      border: 1px solid var(--border); cursor: pointer; flex-shrink: 0;
      background: #1d9e75; transition: transform 0.15s;
    }
    #join-color-preview:hover { transform: scale(1.08); }
    #join-color-input { display: none; }

    .join-btn {
      padding: 13px; background: var(--accent);
      color: #fff; border: none; border-radius: 12px;
      font-family: var(--font-mono); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .join-btn:hover { background: var(--accent2); }
    .join-btn:active { transform: scale(0.98); }
    .join-err { font-size: 12px; color: #f09595; display: none; }
    .join-err.show { display: block; }

    /* ── MAIN APP ── */
    #app {
      display: none; flex-direction: column;
      height: 100vh; max-width: 780px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    header {
      padding: 16px 24px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px; flex-shrink: 0;
    }
    .pulse-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.25);
      animation: pulse 2.2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(29,158,117,0.2); }
      50%      { box-shadow: 0 0 0 7px rgba(29,158,117,0.05); }
    }
    header h1 { font-family: var(--font-mono); font-size: 16px; font-weight: 700; letter-spacing: -0.4px; }
    header h1 span { color: var(--accent3); }
    .header-right { margin-left: auto; }
    #online-pill {
      font-size: 12px; color: var(--muted);
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 11px;
      display: flex; align-items: center; gap: 6px;
    }
    #online-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    #online-pill strong { color: var(--accent3); font-weight: 500; }

    #name-bar {
      padding: 10px 24px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    #name-bar label { font-size: 12px; color: var(--muted); font-family: var(--font-mono); white-space: nowrap; }
    #name-input {
      font-family: var(--font-mono); font-size: 13px; font-weight: 700;
      background: transparent; border: none;
      border-bottom: 1.5px solid var(--accent2);
      padding: 2px 6px; width: 160px; color: var(--accent3);
      outline: none; transition: border-color 0.2s;
    }
    #name-input:focus { border-bottom-color: var(--accent); }
    #color-swatch {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border2); cursor: pointer; flex-shrink: 0;
      transition: transform 0.15s;
    }
    #color-swatch:hover { transform: scale(1.15); }
    #color-input { display: none; }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 6px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .system-msg { text-align: center; font-size: 12px; color: var(--muted); font-style: italic; padding: 4px 0; }

    .date-divider {
      text-align: center; font-size: 11px; color: var(--muted);
      font-family: var(--font-mono); padding: 10px 0 4px; position: relative;
    }
    .date-divider::before, .date-divider::after {
      content: ''; position: absolute; top: 50%; width: 28%; height: 1px; background: var(--border);
    }
    .date-divider::before { left: 0; }
    .date-divider::after { right: 0; }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.self { flex-direction: row-reverse; }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      font-size: 11px; font-weight: 700; font-family: var(--font-mono);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }
    .bubble-col { display: flex; flex-direction: column; max-width: 68%; gap: 2px; }
    .msg-row.self .bubble-col { align-items: flex-end; }
    .sender { font-size: 11px; color: var(--muted); padding: 0 10px; font-weight: 500; }
    .bubble {
      padding: 9px 15px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.55; word-break: break-word;
    }
    .bubble.other { background: var(--bg3); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble.self  { color: #fff; border-bottom-right-radius: 4px; }
    .meta { font-size: 10px; color: var(--muted); padding: 1px 10px 0; }

    #typing-bar {
      height: 24px; padding: 0 24px; font-size: 12px; color: var(--muted);
      font-style: italic; flex-shrink: 0; display: flex; align-items: center; gap: 6px;
    }
    .typing-dots span {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40%          { transform: translateY(-5px); opacity: 1; }
    }

    #input-area {
      padding: 14px 24px; border-top: 1px solid var(--border);
      background: var(--bg2); display: flex; gap: 10px;
      align-items: flex-end; flex-shrink: 0;
    }
    #msg-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 16px;
      font-family: var(--font-body); font-size: 14px; color: var(--text);
      outline: none; resize: none; max-height: 120px;
      transition: border-color 0.2s; line-height: 1.5;
    }
    #msg-input::placeholder { color: var(--muted); }
    #msg-input:focus { border-color: var(--accent2); }
    #send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    #send-btn:hover { background: var(--accent2); }
    #send-btn:active { transform: scale(0.92); }
    #send-btn svg { width: 17px; height: 17px; fill: #fff; }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════
  JOIN SCREEN  — just pick a name, no credentials
════════════════════════════════════════════════ -->
<div id="join-screen">
  <div class="join-card">
    <h2><span>#</span>open-chat</h2>
    <p>Pick a name and jump in — no account needed.</p>

    <div class="join-field">
      <label>Your display name</label>
      <div class="color-row">
        <input id="join-name" type="text" placeholder="Guest" maxlength="20" />
        <input type="color" id="join-color-input" value="#1d9e75" />
        <div id="join-color-preview" title="Pick your colour"></div>
      </div>
    </div>

    <div class="join-err" id="join-err">Please enter a display name.</div>
    <button class="join-btn" id="join-btn">enter the room →</button>
  </div>
</div>

<!-- ════════════════════════════════════════════════
  MAIN CHAT UI
════════════════════════════════════════════════ -->
<div id="app">
  <header>
    <div class="pulse-dot"></div>
    <h1><span>#</span>open-chat</h1>
    <div class="header-right">
      <div id="online-pill">
        <div class="dot"></div>
        <strong id="online-num">1</strong>&nbsp;online
      </div>
    </div>
  </header>

  <div id="name-bar">
    <label>you →</label>
    <input id="name-input" type="text" maxlength="20" placeholder="Guest" />
    <input type="color" id="color-input" />
    <div id="color-swatch" title="Change colour"></div>
  </div>

  <div id="messages"></div>
  <div id="typing-bar"></div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="say something…" rows="1" maxlength="800"></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
/* ╔══════════════════════════════════════════════════════╗
   ║  🔧 ONLY CHANGE THESE TWO LINES                     ║
   ║  Find them by searching: SUPABASE_URL / ANON_KEY    ║
   ╚══════════════════════════════════════════════════════╝ */
const SUPABASE_URL  = 'https://YOUR_PROJECT_ID.supabase.co'; // ← CHANGE THIS
const SUPABASE_ANON = 'YOUR_ANON_KEY_HERE';                  // ← CHANGE THIS

// ─── State ───────────────────────────────────────────────────────────────
let sbClient        = null;
let userName        = 'Guest';
let userColor       = '#1d9e75';
let presenceChannel = null;
let typingTimeout   = null;
let shownDates      = new Set();
const SESSION_ID    = Math.random().toString(36).slice(2, 10);

// ─── Helpers ─────────────────────────────────────────────────────────────
function initials(name) {
  const p = name.trim().split(/\s+/);
  return p.length > 1 ? (p[0][0] + p[1][0]).toUpperCase() : name.slice(0, 2).toUpperCase();
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function fmtDate(iso) {
  const d = new Date(iso), today = new Date();
  if (d.toDateString() === today.toDateString()) return 'today';
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return 'yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
}
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ─── Render helpers ───────────────────────────────────────────────────────
function renderMsg(msg) {
  const msgs    = document.getElementById('messages');
  const isSelf  = msg.username === userName;
  const dateKey = new Date(msg.created_at).toDateString();

  if (!shownDates.has(dateKey)) {
    shownDates.add(dateKey);
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.textContent = fmtDate(msg.created_at);
    msgs.appendChild(div);
  }

  const row = document.createElement('div');
  row.className = 'msg-row' + (isSelf ? ' self' : '');
  row.dataset.id = msg.id;

  const color = esc(msg.color || '#1d9e75');
  row.innerHTML =
    `<div class="avatar" style="background:${color}">${initials(msg.username)}</div>` +
    `<div class="bubble-col">
      ${!isSelf ? `<div class="sender" style="color:${color}">${esc(msg.username)}</div>` : ''}
      <div class="bubble ${isSelf ? 'self' : 'other'}"
           ${isSelf ? `style="background:${color}"` : ''}>${esc(msg.content)}</div>
      <div class="meta">${fmtTime(msg.created_at)}</div>
    </div>`;

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function sysMsg(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'system-msg';
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

// ─── Typing bar ───────────────────────────────────────────────────────────
function updateTypingBar(state) {
  const bar = document.getElementById('typing-bar');
  const typers = Object.values(state).flat()
    .filter(p => p.typing && p.name !== userName)
    .map(p => p.name);
  if (!typers.length) { bar.innerHTML = ''; return; }
  const who = typers.length === 1 ? typers[0]
    : typers.length === 2 ? typers.join(' & ')
    : `${typers[0]} +${typers.length - 1}`;
  bar.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div> ${esc(who)} typing…`;
}

async function trackTyping(val) {
  if (!presenceChannel) return;
  await presenceChannel.track({ name: userName, color: userColor, typing: val });
}

// ─── Init chat (called after name chosen) ────────────────────────────────
async function initChat() {
  sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('name-input').value = userName;
  document.getElementById('color-swatch').style.background = userColor;
  document.getElementById('color-input').value = userColor;

  // Load history
  const { data: history } = await sbClient
    .from('messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(100);
  (history || []).forEach(renderMsg);

  // Realtime new messages
  sbClient.channel('public:messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
      if (!document.querySelector(`[data-id="${payload.new.id}"]`)) renderMsg(payload.new);
    })
    .subscribe();

  // Presence — online count + typing
  presenceChannel = sbClient.channel('presence', { config: { presence: { key: SESSION_ID } } });
  presenceChannel
    .on('presence', { event: 'sync' }, () => {
      const state = presenceChannel.presenceState();
      document.getElementById('online-num').textContent = Object.values(state).flat().length;
      updateTypingBar(state);
    })
    .subscribe(async status => {
      if (status === 'SUBSCRIBED') {
        await presenceChannel.track({ name: userName, color: userColor, typing: false });
      }
    });

  sysMsg(`you joined as ${userName}`);
  document.getElementById('msg-input').focus();
}

// ─── Send message ─────────────────────────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || !sbClient) return;

  userName = document.getElementById('name-input').value.trim() || 'Guest';

  const optimistic = {
    id: 'opt-' + Date.now(),
    created_at: new Date().toISOString(),
    username: userName, color: userColor, content: text
  };
  renderMsg(optimistic);
  input.value = '';
  input.style.height = 'auto';
  await trackTyping(false);

  const { data, error } = await sbClient
    .from('messages')
    .insert([{ username: userName, color: userColor, content: text }])
    .select().single();

  if (!error && data) {
    const el = document.querySelector(`[data-id="${optimistic.id}"]`);
    if (el) el.dataset.id = data.id;
  }
}

// ─── Join screen events ───────────────────────────────────────────────────
document.getElementById('join-color-preview').addEventListener('click', () => {
  document.getElementById('join-color-input').click();
});
document.getElementById('join-color-input').addEventListener('input', e => {
  document.getElementById('join-color-preview').style.background = e.target.value;
  userColor = e.target.value;
});
document.getElementById('join-btn').addEventListener('click', () => {
  const name = document.getElementById('join-name').value.trim();
  const err  = document.getElementById('join-err');
  if (!name) { err.classList.add('show'); return; }
  err.classList.remove('show');
  userName  = name;
  userColor = document.getElementById('join-color-input').value || '#1d9e75';
  localStorage.setItem('oc_name', name);
  localStorage.setItem('oc_color', userColor);
  initChat();
});
document.getElementById('join-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('join-btn').click();
});

// ─── In-chat controls ────────────────────────────────────────────────────
document.getElementById('name-input').addEventListener('change', async function() {
  const old = userName;
  userName = this.value.trim() || 'Guest';
  if (userName !== old) { sysMsg(`you are now "${userName}"`); await trackTyping(false); }
});
document.getElementById('color-swatch').addEventListener('click', () => {
  document.getElementById('color-input').click();
});
document.getElementById('color-input').addEventListener('input', async e => {
  userColor = e.target.value;
  document.getElementById('color-swatch').style.background = userColor;
  await trackTyping(false);
});

// ─── Message input ────────────────────────────────────────────────────────
const msgInput = document.getElementById('msg-input');
msgInput.addEventListener('input', async function() {
  autoGrow(this);
  await trackTyping(true);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => trackTyping(false), 2500);
});
msgInput.addEventListener('keydown', async e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    clearTimeout(typingTimeout);
    await sendMsg();
  }
});
document.getElementById('send-btn').addEventListener('click', async () => {
  clearTimeout(typingTimeout);
  await sendMsg();
});

// ─── Restore last-used name on page load ─────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const name  = localStorage.getItem('oc_name');
  const color = localStorage.getItem('oc_color') || '#1d9e75';
  if (name) document.getElementById('join-name').value = name;
  document.getElementById('join-color-input').value = color;
  document.getElementById('join-color-preview').style.background = color;
  userColor = color;
});
</script>
</body>
</html>
