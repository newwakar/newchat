<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="chat-container">
        <div id="chat-window"></div>
        <div id="input-area">
            <input type="text" id="username" placeholder="Name">
            <input type="text" id="message" placeholder="Message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
// Use a unique name to avoid the "redeclaration" error
const _URL = 'https://yflamhkpiiserkouoddn.supabase.co';
const _KEY = 'sb_publishable_jeIYowehIo1v1TwDmOcmnA__scjV28B';
const db = supabase.createClient(_URL, _KEY);

const chatWindow = document.getElementById('chat-window');
const messageInput = document.getElementById('message');
const userInput = document.getElementById('username');

// 1. Fetch existing messages
async function fetchMessages() {
    const { data, error } = await db
        .from('messages')
        .select('*')
        .order('created_at', { ascending: true });
    
    if (error) {
        console.error("Fetch Error:", error.message);
    } else {
        chatWindow.innerHTML = '';
        data.forEach(msg => appendMessage(msg));
    }
}

// 2. Add message to the screen
function appendMessage(msg) {
    const div = document.createElement('div');
    div.className = 'msg-item';
    div.innerHTML = `<strong>${msg.username}:</strong> ${msg.content}`;
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

// 3. Send message logic
document.getElementById('send-btn').onclick = async () => {
    const user = userInput.value || 'Anonymous';
    const text = messageInput.value;
    
    if (!text) return;

    const { error } = await db
        .from('messages')
        .insert([{ username: user, content: text }]);

    if (error) {
        console.error("Send Error:", error.message);
        alert("Error sending: " + error.message);
    } else {
        messageInput.value = '';
    }
};

// 4. Real-time setup
const channel = db.channel('room1')
    .on('postgres_changes', { 
        event: 'INSERT', 
        schema: 'public', 
        table: 'messages' 
    }, payload => {
        appendMessage(payload.new);
    })
    .subscribe((status) => {
        console.log("Realtime status:", status);
    });

// Initial load
fetchMessages();
    </script> 
</body>
</html>
