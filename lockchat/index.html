<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>App Menu With Lock Screen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #000;
      overflow: hidden;
    }

    /* The Lock Screen Container */
    #root {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2; /* Keeps the lock screen on top */
      pointer-events: auto;
    }

    /* The Hidden Site Container */
    .site-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1; /* Sits behind the lock screen */
    }

    .embedded-site {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* This class will be triggered when the lock screen is swiped/cleared */
    .unlocked #root {
      display: none; 
    }
  </style>
</head>
<body>

<!-- The App/Lock Screen Layer -->
<div id="root"></div>

<!-- The Embedded Site Layer -->
<div class="site-wrapper">
  <object type="text/html" data="https://wchatr.vercel.app/" class="embedded-site">
    <embed src="https://wchatr.vercel.app/" class="embedded-site">
  </object>
</div>

<!-- Dependencies -->
<script src='https://unpkg.com/react@17/umd/react.development.js'></script>
<script src='https://unpkg.com/react-dom@17/umd/react-dom.development.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/classnames/2.3.1/index.min.js'></script>

<!-- The Hyperplexed Script (Creates the UI) -->
<script src='https://codepen.io/Hyperplexed/pen/xxYJYjM/54407644e24173ad6019b766443bf2a6.js'></script>

<script>
  // Monitor the #root div. 
  // When the "Lock Screen" class disappears from the React app, 
  // we ensure the site-wrapper is visible.
  const observer = new MutationObserver(() => {
    const lockScreen = document.querySelector('.lock-screen');
    if (!lockScreen) {
      document.body.classList.add('unlocked');
    }
  });

  observer.observe(document.getElementById('root'), { childList: true, subtree: true });
</script>

<script src="./script.js"></script>

</body>
</html>
