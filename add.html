<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat App with Lock Screen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  
  <!-- External Resources -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=Rubik:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css">

  <style>
    /* --- MERGED CSS VARIABLES --- */
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
      --accent: #1d9e75; --accent2: #0f6e56; --accent3: #9fe1cb;
      --text: #e6edf3; --muted: #7d8590;
      --font-mono: 'Space Mono', monospace; --font-body: 'DM Sans', sans-serif;
      --radius: 14px;
    }

    body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #000; overflow: hidden; }

    /* The Lock Screen Container (React) */
    #root {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1000; pointer-events: auto;
    }

    /* The Chat App Container (Supabase) */
    .site-wrapper {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; visibility: hidden; background: var(--bg);
    }

    /* Unlock Transition */
    .unlocked #root { display: none; }
    .unlocked .site-wrapper { visibility: visible; }

    /* Custom Chat Overrides to fit full screen */
    #app-chat { 
      display: none; flex-direction: column; height: 100vh; 
      max-width: 780px; margin: 0 auto;
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
    }
  </style>
</head>
<body>

<!-- LAYER 1: LOCK SCREEN (REACT) -->
<div id="root"></div>

<!-- LAYER 2: CHAT APP (SUPABASE) -->
<div class="site-wrapper">
  
  <!-- JOIN SCREEN -->
  <div id="join-screen">
    <div class="join-card">
      <h2><span>#</span>open-chat</h2>
      <p>Pick a name and jump in — no account needed.</p>
      <div class="join-field">
        <label>Your display name</label>
        <div class="color-row">
          <input id="join-name" type="text" placeholder="Guest" maxlength="20" />
          <input type="color" id="join-color-input" value="#1d9e75" />
          <div id="join-color-preview" title="Pick your colour"></div>
        </div>
      </div>
      <div class="join-err" id="join-err">Please enter a display name.</div>
      <button class="join-btn" id="join-btn">enter the room →</button>
    </div>
  </div>

  <!-- MAIN CHAT UI -->
  <div id="app-chat">
    <header>
      <div class="pulse-dot"></div>
      <h1><span>#</span>open-chat</h1>
      <div class="header-right">
        <div id="online-pill">
          <div class="dot"></div>
          <strong id="online-num">1</strong>&nbsp;online
        </div>
      </div>
    </header>
    <div id="name-bar">
      <label>you →</label>
      <input id="name-input" type="text" maxlength="20" placeholder="Guest" />
      <input type="color" id="color-input" />
      <div id="color-swatch" title="Change colour"></div>
    </div>
    <div id="messages"></div>
    <div id="typing-bar"></div>
    <div id="input-area">
      <textarea id="msg-input" placeholder="say something…" rows="1" maxlength="800"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- SCRIPTS: LOCK SCREEN DEPENDENCIES -->
<script src='https://unpkg.com/react@17/umd/react.development.js'></script>
<script src='https://unpkg.com/react-dom@17/umd/react-dom.development.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/classnames/2.3.1/index.min.js'></script>
<script src='https://codepen.io/Hyperplexed/pen/xxYJYjM/54407644e24173ad6019b766443bf2a6.js'></script>
<script src="./script.js"></script>

<!-- SCRIPTS: CHAT LOGIC -->
<script>
/* Supabase Config */
const SUPABASE_URL  = 'https://YOUR_PROJECT_ID.supabase.co'; 
const SUPABASE_ANON = 'YOUR_ANON_KEY_HERE'; 

// State and Functions (Rest of your chat script logic...)
let sbClient = null, userName = 'Guest', userColor = '#1d9e75', presenceChannel = null;
const SESSION_ID = Math.random().toString(36).slice(2, 10);

/* --- LOCK SCREEN OBSERVER --- */
// Watches for the React app to switch to 'logged-in' state
const observer = new MutationObserver(() => {
  const appElement = document.querySelector('#app'); 
  if (appElement && appElement.classList.contains('logged-in')) {
    document.body.classList.add('unlocked');
  }
});
observer.observe(document.getElementById('root'), { childList: true, subtree: true });

/* --- CHAT FUNCTIONS --- */
// (Insert the initials, fmtTime, fmtDate, renderMsg, sendMsg, and initChat functions from your chat code here)
// Note: Changed ID "app" to "app-chat" in HTML to avoid conflict with React's "app" ID.
function initials(n){/*...*/}
async function initChat(){
  sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('app-chat').style.display = 'flex';
  // ... rest of initChat logic
}

// ... All other chat event listeners (join-btn, send-btn, etc.)
</script>

</body>
</html>
